services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: fennex
      POSTGRES_PASSWORD: fennex
      POSTGRES_DB: fennex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fennex"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fennex:fennex@postgres:5432/fennex
      REDIS_URL: redis://redis:6379/0
      CRAWLER_SERVICE_URL: http://crawler:8001
    volumes:
      - ./apps/api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./apps/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://fennex:fennex@postgres:5432/fennex
      REDIS_URL: redis://redis:6379/0
      CRAWLER_SERVICE_URL: http://crawler:8001
    volumes:
      - ./apps/api:/app
    command: python -m arq app.workers.worker.WorkerSettings

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    ports:
      - "3001:3000"
    depends_on:
      - api
    env_file: .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/.next

  crawler:
    build: ./services/crawler
    ports:
      - "8001:8001"
    restart: unless-stopped

  # image-gen service is added in Phase 2

volumes:
  postgres_data:
  redis_data:
