services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: fennex
      POSTGRES_PASSWORD: fennex
      POSTGRES_DB: fennex
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fennex"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./apps/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  worker:
    build: ./apps/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    restart: unless-stopped
    command: python -m arq app.workers.worker.WorkerSettings

  web:
    build: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file: .env
    restart: unless-stopped

  # crawler and image-gen services are added in Phase 2
  # crawler:
  #   build: ./services/crawler
  #   env_file: .env
  #   restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
